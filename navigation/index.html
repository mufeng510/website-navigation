<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <title>沐风导航</title>
    <meta name="description" content="个人常用网站导航与快捷搜索入口。">
    <link rel="apple-touch-icon-precomposed" href="280.png" />
    <meta name="msapplication-TileImage" content="280.png" />
    <link rel="shortcut icon" href="32.png" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-touch-fullscreen" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="full-screen" content="yes">
    <!--UC强制全屏-->
    <meta name="browsermode" content="application">
    <!--UC应用模式-->
    <meta name="x5-fullscreen" content="true">
    <!--QQ强制全屏-->
    <meta name="x5-page-mode" content="app">
    <!--QQ应用模式-->
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/css/bootstrap.min.css" type="text/css"
        rel="stylesheet" />
    <link rel='stylesheet' href='style.css'>
    <script defer src="https://at.alicdn.com/t/font_1230786_ewprpwrczvj.js"></script>
    <script defer src="https://at.alicdn.com/t/c/font_4380032_vyk4u9tnwj.js"></script>
    <script defer src="sou.js"></script>
    <script defer src="url.js"></script>
    <script defer src="main.js"></script>
</head>

<body>
    <!--topbar开始-->
    <ul class="top-links">
        <li><a href="https://blog.cf.yq59.top" target="_blank" rel="noopener">博客</a></li>
        <li><a href="https://github.com/mufeng510" target="_blank" rel="noopener">Github</a></li>
    </ul>
    <!--topbar结束-->
    <div class="container page-shell">
        <!--搜索开始-->
        <div id="search" class="s-search">
            <div id="search-list" class="hide-type-list">
                <div class="search-group group-a s-current" style="padding-left: 20px">
                    <ul class="search-type">
                        <li><input checked="" hidden="" type="radio" name="type" id="type-bing"
                                value="https://cn.bing.com/search?q=" data-placeholder="Bing搜索"><label
                                for="type-bing"><span style="color:#048787">Bing</span></label></li>
                        <li><input hidden="" type="radio" name="type" id="type-google"
                                value="https://www.google.com/search?q=" data-placeholder="谷歌搜索"><label
                                for="type-google"><span style="color:#3B83FA">G</span><span
                                    style="color:#F3442C">o</span><span style="color:#FFC300">o</span><span
                                    style="color:#4696F8">g</span><span style="color:#2CAB4E">l</span><span
                                    style="color:#F54231">e</span></label></li>
                        <li><input hidden="" type="radio" name="type" id="type-sougou"
                                value="https://weixin.sogou.com/weixin?type=2&query=" data-placeholder="微信公众号搜索"><label
                                for="type-sougou"><span style="color:#FF8022">微信</span></label></li>
                        <!-- <li><input hidden="" type="radio" name="type" id="type-baidu"
                                value="https://www.baidu.com/s?wd=" data-placeholder="百度一下"><label
                                for="type-baidu"><span style="color:#2100E0">百度</span></label></li> -->
                        <li><input hidden="" type="radio" name="type" id="type-book"
                                value="https://zh.annas-archive.org/search?q=" data-placeholder="书籍搜索"><label
                                for="type-book"><span style="color:#000000">书籍</span></label></li>
                        <!-- <li><input hidden="" type="radio" name="type" id="type-cupfox" value="https://www.yunpanziyuan.xyz/fontsearch.htm?fontname=" data-placeholder="电影、剧集、综艺、动漫"><label for="type-cupfox"><span style="color:#FFBF80">影视</span></label></li> -->
                        <!-- <li><input hidden="" type="radio" name="type" id="type-weibo" value="https://s.weibo.com/weibo/" data-placeholder="微博搜索"><label for="type-weibo"><span style="color:#ff5722">微博</span></label></li> -->
                    </ul>
                </div>
            </div>
            <form action="https://cn.bing.com/search?q=" method="get" target="_blank" id="super-search-fm">
                <input type="text" id="search-text" placeholder="Bing搜索" autocomplete="off">
                <button class="submit" type="submit" aria-label="搜索">
                    <svg class="icon search-submit-icon" aria-hidden="true">
                        <use xlink:href="#icon-sousuo"></use>
                    </svg>
                </button>
                <ul id="word"></ul>
            </form>
            <div class="set-check hidden-xs">
                <input type="checkbox" id="set-search-blank" class="bubble-3" autocomplete="off">
            </div>
        </div>
        <!--搜索结束-->
        <ul class="mylist row" id="urlContainer"></ul>
        <!-- <div id="fristUrlContainer"></div>
        <div id="secondUrlContainer"></div> -->
    </div>
    <!--版权信息开始-->
    <p class="mt-5 mb-3 text-muted text-center">©2021 by <a href="https://blog.5iux.cn/">5iux</a>. All rights reserved.
    </p>

</body>

</html>
